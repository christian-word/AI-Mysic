<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Audio Lab</title>
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <style>
        :root {
            --accent: #534AB7;
            --accent-light: #7B6FD4;
            --bg: #f5f5f7;
            --card: #ffffff;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --border: rgba(0, 0, 0, 0.06);
            --shadow-soft: 0 20px 60px rgba(0, 0, 0, 0.08);
            --shadow-medium: 0 8px 30px rgba(83, 74, 183, 0.12);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 24px 16px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        #app { 
            width: 100%; 
            max-width: 600px; 
        }

        h1 {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-secondary);
            text-align: center;
            margin: 0 0 28px 0;
            opacity: 0.8;
        }

        #folder-nav {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 4px 4px 20px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        #folder-nav::-webkit-scrollbar { display: none; }

        .folder-btn {
            padding: 10px 22px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-secondary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }
        .folder-btn:hover {
            border-color: rgba(83, 74, 183, 0.3);
            color: var(--accent);
            transform: translateY(-1px);
        }
        .folder-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: var(--shadow-medium);
        }

        #waveform-container {
            background: var(--card);
            border-radius: 24px;
            padding: 32px 28px 28px;
            box-shadow: var(--shadow-soft);
            margin-bottom: 20px;
            position: sticky;
            top: 16px;
            z-index: 100;
            border: 1px solid var(--border);
        }

        #track-name {
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
            min-height: 28px;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        #track-meta {
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-weight: 400;
        }

        #time-info {
            display: flex;
            justify-content: space-between;
            font-family: "SF Mono", "Monaco", "Inconsolata", monospace;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 12px;
            padding: 0 2px;
            letter-spacing: 0.5px;
        }

        #waveform { 
            width: 100%; 
            height: 80px; 
            cursor: pointer;
            border-radius: 4px;
            overflow: hidden;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 24px;
            position: relative;
            gap: 32px;
        }

        .playback-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-nav {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
        }
        .btn-nav:hover {
            color: var(--accent);
            background: rgba(83, 74, 183, 0.08);
        }

        .btn-play {
            background: var(--accent);
            color: white;
            border: none;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(83, 74, 183, 0.35);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-play:hover {
            background: var(--accent-light);
            transform: scale(1.05);
        }

        .volume-container {
            position: absolute;
            right: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #volumeSlider {
            -webkit-appearance: none;
            width: 90px;
            height: 4px;
            background: rgba(0, 0, 0, 0.08);
            border-radius: 999px;
            outline: none;
        }
        #volumeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }

        #playlist {
            background: var(--card);
            border-radius: 24px;
            padding: 12px;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border);
        }

        .t-item {
            padding: 14px 18px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            margin-bottom: 3px;
            transition: all 0.2s ease;
        }
        .t-item:hover { background: rgba(83, 74, 183, 0.04); }
        .t-item.active { background: rgba(83, 74, 183, 0.1); }
        .t-item.active .t-title { color: var(--accent); font-weight: 500; }

        .t-num { font-family: "SF Mono", monospace; font-size: 12px; color: var(--text-secondary); width: 32px; }
        .t-title { flex: 1; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        #load-msg { text-align: center; color: var(--text-secondary); padding: 60px 20px; font-size: 14px; }

        @media (max-width: 480px) {
            .volume-container { position: static; }
            .controls { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

<div id="app">
    <h1>AI Music Lab</h1>
    <div id="folder-nav"></div>
    <div id="waveform-container">
        <div id="track-name">Оберіть папку</div>
        <div id="track-meta">Готовий</div>
        <div id="time-info">
            <span id="current-time">00:00</span>
            <span id="duration">00:00</span>
        </div>
        <div id="waveform"></div>
        <div class="controls">
            <div class="playback-controls">
                <button class="btn-nav" id="prevBtn">⏮</button>
                <button class="btn-play" id="playBtn">▶</button>
                <button class="btn-nav" id="nextBtn">⏭</button>
            </div>
            <div class="volume-container">
                <span class="volume-icon">🔈</span>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.75">
            </div>
        </div>
    </div>
    <div id="playlist">
        <div id="load-msg">Завантаження...</div>
    </div>
</div>

<script>
    const USER_REPO = 'christian-word/AI-Mysic';
    const BASE_API = `https://api.github.com/repos/${USER_REPO}/contents/`;
    const FORBIDDEN_FOLDERS = ['Святий-обмін-2', 'temp', 'docs'];

    let tracks = [], idx = 0;
    let isSwitching = false;                    // ← Защита от двойного переключения

    const trackName = document.getElementById('track-name');
    const trackMeta = document.getElementById('track-meta');
    const currentTimeEl = document.getElementById('current-time');
    const durationEl = document.getElementById('duration');
    const playlist = document.getElementById('playlist');
    const folderNav = document.getElementById('folder-nav');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const volumeSlider = document.getElementById('volumeSlider');

    const ws = WaveSurfer.create({
        container: '#waveform',
        waveColor: '#D1D1D6',
        progressColor: '#534AB7',
        cursorColor: '#534AB7',
        barWidth: 1,
        barGap: 1,
        height: 80,
        responsive: true,
        normalize: true
    });

    const formatTime = (s) => {
        const min = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    };

    // --- ОБРАБОТЧИКИ СОБЫТИЙ ---
    ws.on('decode', (d) => { durationEl.textContent = formatTime(d); });
    ws.on('timeupdate', (t) => { currentTimeEl.textContent = formatTime(t); });
    ws.on('play', () => { playBtn.innerHTML = '❚❚'; });
    ws.on('pause', () => { playBtn.innerHTML = '▶'; });

    // Надёжное автопереключение
    ws.on('finish', () => {
        if (isSwitching) return;
        isSwitching = true;
        console.log("Трек завершен → переключаю на следующий");
        
        changeTrack(1);
        
        // Снимаем блокировку через 800 мс
        setTimeout(() => { isSwitching = false; }, 800);
    });

    volumeSlider.oninput = (e) => ws.setVolume(e.target.value);
    playBtn.onclick = () => ws.playPause();
    prevBtn.onclick = () => changeTrack(-1);
    nextBtn.onclick = () => changeTrack(1);

    // --- ЛОГИКА ПЛЕЕРА ---
    async function playTrack(i) {
        if (!tracks[i]) return;

        isSwitching = true;                    // Блокируем автопереключение во время смены трека

        ws.pause();
        idx = i;

        updateUI();
        currentTimeEl.textContent = "00:00";
        trackMeta.textContent = "Завантаження...";

        try {
            await ws.load(tracks[idx].url);
            trackMeta.textContent = "Відтворення...";
            
            await ws.play();
        } catch (e) {
            console.error("Помилка відтворення:", e);
            trackMeta.textContent = "Помилка завантаження";
        } finally {
            // Снимаем блокировку через небольшую задержку
            setTimeout(() => { isSwitching = false; }, 600);
        }
    }

    function changeTrack(direction) {
        if (tracks.length === 0) return;
        let newIdx = idx + direction;
        if (newIdx >= tracks.length) newIdx = 0;
        if (newIdx < 0) newIdx = tracks.length - 1;
        playTrack(newIdx);
    }

    function updateUI() {
        document.querySelectorAll('.t-item').forEach((el, i) => {
            el.classList.toggle('active', i === idx);
            if (i === idx) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });
        if (tracks[idx]) trackName.textContent = tracks[idx].name;
    }

    const clean = n => {
        try {
            return decodeURIComponent(n).replace(/\.[^.]+$/, '').replace(/^\d+[\.\-_\s]+/, '').trim();
        } catch(e) { return n; }
    };

    async function init() {
        try {
            const response = await fetch(BASE_API);
            const items = await response.json();
            const folders = items.filter(i => i.type === 'dir' && !i.name.startsWith('.') && !FORBIDDEN_FOLDERS.includes(i.name));

            folderNav.innerHTML = '';
            folders.forEach((f, i) => {
                const btn = document.createElement('div');
                btn.className = 'folder-btn' + (i === 0 ? ' active' : '');
                btn.textContent = f.name;
                btn.onclick = () => {
                    document.querySelectorAll('.folder-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadTracks(f.path);
                };
                folderNav.appendChild(btn);
            });
            if (folders.length > 0) loadTracks(folders[0].path);
        } catch (e) { 
            playlist.innerHTML = '<div id="load-msg">Помилка API</div>'; 
        }
    }

    async function loadTracks(path) {
        playlist.innerHTML = '<div id="load-msg">Завантаження треків...</div>';
        try {
            const response = await fetch(BASE_API + encodeURIComponent(path));
            const data = await response.json();
            tracks = data
                .filter(f => /\.(mp3|wav|m4a)$/i.test(f.name))
                .sort((a,b) => a.name.localeCompare(b.name, 'uk'))
                .map(f => ({ name: clean(f.name), url: f.download_url }));
            
            playlist.innerHTML = '';
            tracks.forEach((t, i) => {
                const d = document.createElement('div');
                d.className = 't-item';
                d.innerHTML = `<span class="t-num">${(i+1).toString().padStart(2, '0')}</span><span class="t-title">${t.name}</span>`;
                d.onclick = () => playTrack(i);
                playlist.appendChild(d);
            });
            trackName.textContent = "Оберіть трек";
            trackMeta.textContent = `${tracks.length} треків`;
            idx = 0;
        } catch (e) { 
            playlist.innerHTML = '<div id="load-msg">Помилка завантаження</div>'; 
        }
    }

    init();
</script>
</body>
</html>
