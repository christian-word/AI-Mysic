<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Music Lab - Compact Pro</title>
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <style>
        :root {
            --accent: #534AB7;
            --accent-light: #7B6FD4;
            --bg: #f5f5f7;
            --card: #ffffff;
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --border: rgba(0, 0, 0, 0.06);
            --shadow-soft: 0 15px 40px rgba(0, 0, 0, 0.06);
            --shadow-medium: 0 8px 30px rgba(83, 74, 183, 0.12);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 16px 12px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        #app { 
            width: 100%; 
            max-width: 500px; 
        }

        h1 {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-secondary);
            text-align: center;
            margin: 0 0 16px 0;
            opacity: 0.7;
        }

        #folder-nav {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0 12px;
            scrollbar-width: none;
        }
        #folder-nav::-webkit-scrollbar { display: none; }

        .folder-btn {
            padding: 8px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
        }
        .folder-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        #waveform-container {
            background: var(--card);
            border-radius: 20px;
            padding: 16px;
            box-shadow: var(--shadow-soft);
            margin-bottom: 12px;
            position: sticky;
            top: 12px;
            z-index: 100;
            border: 1px solid var(--border);
        }

        #track-name {
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 2px;
            min-height: 22px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #track-meta {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        #time-info {
            display: flex;
            justify-content: space-between;
            font-family: "SF Mono", monospace;
            font-size: 10px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        #waveform { 
            width: 100%; 
            height: 40px; 
            cursor: pointer;
            -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 50%);
            mask-image: linear-gradient(to bottom, black 50%, transparent 50%);
            margin-bottom: -15px; 
            position: relative;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 4px;
        }

        .playback-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-nav {
            background: none;
            border: none;
            font-size: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .btn-play {
            background: var(--accent);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(83, 74, 183, 0.3);
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #volumeSlider {
            -webkit-appearance: none;
            width: 70px;
            height: 3px;
            background: rgba(0, 0, 0, 0.08);
            border-radius: 10px;
            outline: none;
        }
        #volumeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }

        #playlist {
            background: var(--card);
            border-radius: 20px;
            padding: 8px;
            border: 1px solid var(--border);
        }

        .t-item {
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            margin-bottom: 2px;
            transition: 0.2s;
        }
        .t-item:hover { background: rgba(83, 74, 183, 0.03); }
        .t-item.active { background: rgba(83, 74, 183, 0.08); }
        .t-item.active .t-title { color: var(--accent); font-weight: 500; }

        .t-num { font-family: monospace; font-size: 11px; color: var(--text-secondary); width: 28px; }
        .t-title { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        #load-msg { text-align: center; color: var(--text-secondary); padding: 40px 0; font-size: 13px; }

        /* Адаптивность: оставляем ползунок видимым на мобильных, но чуть уменьшаем отступы */
        @media (max-width: 380px) {
            #volumeSlider { width: 50px; }
            .playback-controls { gap: 8px; }
        }
    </style>
</head>
<body>

<div id="app">
    <h1>AI Music Lab</h1>
    <div id="folder-nav"></div>
    <div id="waveform-container">
        <div id="track-name">Оберіть папку</div>
        <div id="track-meta">Готовий</div>
        <div id="time-info">
            <span id="current-time">00:00</span>
            <span id="duration">00:00</span>
        </div>
        <div id="waveform"></div>
        <div class="controls">
            <div class="playback-controls">
                <button class="btn-nav" id="prevBtn">⏮</button>
                <button class="btn-play" id="playBtn">▶</button>
                <button class="btn-nav" id="nextBtn">⏭</button>
            </div>
            <div class="volume-container">
                <span style="font-size: 12px">🔈</span>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.75">
            </div>
        </div>
    </div>
    <div id="playlist">
        <div id="load-msg">Завантаження...</div>
    </div>
</div>

<script>
    const USER_REPO = 'christian-word/AI-Mysic';
    const BASE_API = `https://api.github.com/repos/${USER_REPO}/contents/`;
    const FORBIDDEN_FOLDERS = ['Святий-обмін-2', 'temp', 'docs'];

    let tracks = [], idx = 0;
    let isSwitching = false;

    const trackName = document.getElementById('track-name');
    const trackMeta = document.getElementById('track-meta');
    const currentTimeEl = document.getElementById('current-time');
    const durationEl = document.getElementById('duration');
    const playlist = document.getElementById('playlist');
    const folderNav = document.getElementById('folder-nav');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const volumeSlider = document.getElementById('volumeSlider');

    const ws = WaveSurfer.create({
        container: '#waveform',
        waveColor: '#D1D1D6',
        progressColor: '#534AB7',
        cursorColor: '#534AB7',
        cursorWidth: 2,
        barWidth: 1,      // Тонкие полоски
        barGap: 1,        // Высокая плотность
        height: 50,
        responsive: true,
        normalize: true,
        barRadius: 2
    });

    const formatTime = (s) => {
        if (!s || s < 0) return "00:00";
        const min = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    };

    ws.on('decode', (d) => { durationEl.textContent = formatTime(d); });
    ws.on('timeupdate', (t) => { currentTimeEl.textContent = formatTime(t); });
    ws.on('play', () => { playBtn.innerHTML = '❚❚'; });
    ws.on('pause', () => { playBtn.innerHTML = '▶'; });

    ws.on('finish', () => {
        if (isSwitching) return;
        changeTrack(1);
    });

    volumeSlider.oninput = (e) => ws.setVolume(e.target.value);
    playBtn.onclick = () => ws.playPause();
    prevBtn.onclick = () => changeTrack(-1);
    nextBtn.onclick = () => changeTrack(1);

    async function playTrack(i) {
        if (!tracks[i]) return;
        isSwitching = true;
        ws.pause();
        idx = i;
        updateUI();
        
        currentTimeEl.textContent = "00:00";
        durationEl.textContent = "00:00";
        trackMeta.textContent = "Завантаження...";
        
        try {
            await ws.load(tracks[idx].url);
            trackMeta.textContent = "Відтворення...";
            await ws.play();
        } catch (e) {
            console.error(e);
            trackMeta.textContent = "Помилка";
        } finally {
            setTimeout(() => { isSwitching = false; }, 600);
        }
    }

    function changeTrack(direction) {
        if (tracks.length === 0) return;
        let newIdx = idx + direction;
        if (newIdx >= tracks.length) newIdx = 0;
        if (newIdx < 0) newIdx = tracks.length - 1;
        playTrack(newIdx);
    }

    function updateUI() {
        document.querySelectorAll('.t-item').forEach((el, i) => {
            el.classList.toggle('active', i === idx);
        });
        if (tracks[idx]) trackName.textContent = tracks[idx].name;
    }

    const clean = n => {
        try {
            return decodeURIComponent(n).replace(/\.[^.]+$/, '').replace(/^\d+[\.\-_\s]+/, '').trim();
        } catch(e) { return n; }
    };

    async function init() {
        try {
            const response = await fetch(BASE_API);
            const items = await response.json();
            const folders = items.filter(i => i.type === 'dir' && !i.name.startsWith('.') && !FORBIDDEN_FOLDERS.includes(i.name));

            folderNav.innerHTML = '';
            folders.forEach((f, i) => {
                const btn = document.createElement('div');
                btn.className = 'folder-btn' + (i === 0 ? ' active' : '');
                btn.textContent = f.name;
                btn.onclick = () => {
                    document.querySelectorAll('.folder-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadTracks(f.path);
                };
                folderNav.appendChild(btn);
            });
            if (folders.length > 0) loadTracks(folders[0].path);
        } catch (e) { 
            playlist.innerHTML = '<div id="load-msg">API Error</div>'; 
        }
    }

    async function loadTracks(path) {
        playlist.innerHTML = '<div id="load-msg">Завантаження...</div>';
        try {
            const response = await fetch(BASE_API + encodeURIComponent(path));
            const data = await response.json();
            tracks = data
                .filter(f => /\.(mp3|wav|m4a)$/i.test(f.name))
                .sort((a,b) => a.name.localeCompare(b.name, 'uk'))
                .map(f => ({ name: clean(f.name), url: f.download_url }));
            
            playlist.innerHTML = '';
            tracks.forEach((t, i) => {
                const d = document.createElement('div');
                d.className = 't-item';
                d.innerHTML = `<span class="t-num">${(i+1).toString().padStart(2, '0')}</span><span class="t-title">${t.name}</span>`;
                d.onclick = () => playTrack(i);
                playlist.appendChild(d);
            });
            trackName.textContent = "Оберіть трек";
            trackMeta.textContent = `${tracks.length} треків`;
        } catch (e) { 
            playlist.innerHTML = '<div id="load-msg">Помилка завантаження</div>'; 
        }
    }

    init();
</script>
</body>
</html>
