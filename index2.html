<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Audio Mobile</title>
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <style>
        :root {
            --accent: #00d2ff;
            --bg: #0a0e17;
            --card-bg: #151b2b;
            --text: #e2e8f0;
            --secondary: #64748b;
            --wave-bg: #1e293b;
            --glow: rgba(0, 210, 255, 0.2);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: radial-gradient(circle at top, #161f33 0%, var(--bg) 100%); 
            color: var(--text); margin: 0; padding: 0;
            display: flex; justify-content: center; min-height: 100vh;
        }

        #app { width: 100%; max-width: 600px; padding: 15px; display: flex; flex-direction: column; }

        h1 {
            font-size: 10px; text-transform: uppercase; letter-spacing: 3px;
            color: var(--secondary); margin: 10px 0 20px; text-align: center;
        }

        /* Навігація папок - адаптована для свайпів */
        #folder-nav {
            display: flex; gap: 8px; overflow-x: auto; padding-bottom: 15px;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        #folder-nav::-webkit-scrollbar { display: none; }

        .folder-btn {
            padding: 12px 20px; background: var(--card-bg); border-radius: 14px;
            font-size: 14px; cursor: pointer; white-space: nowrap;
            transition: 0.3s; color: var(--secondary); border: 1px solid rgba(255,255,255,0.05);
        }
        .folder-btn.active { 
            background: var(--accent); color: #0a0e17; font-weight: 600;
            box-shadow: 0 4px 15px var(--glow);
        }

        /* Липкий блок управління для мобільних */
        #waveform-container {
            background: rgba(21, 27, 43, 0.95); padding: 20px; border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            margin-bottom: 20px; position: sticky; top: 10px; z-index: 100;
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
        }

        #theme-switcher {
            display: flex; gap: 12px; justify-content: center; margin-bottom: 15px;
        }
        .theme-dot { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); }
        .theme-dot.active { border-color: #fff; transform: scale(1.1); }

        #track-name {
            font-size: 17px; font-weight: 500; margin-bottom: 15px;
            display: block; text-align: center; height: 24px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            color: #fff;
        }

        #waveform { width: 100%; height: 70px; cursor: pointer; }

        .controls {
            display: flex; align-items: center; justify-content: space-between; 
            margin-top: 15px; gap: 15px;
        }

        .btn-play {
            background: var(--accent); color: #0a0e17; border: none;
            width: 60px; height: 60px; border-radius: 50%; cursor: pointer;
            font-size: 24px; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; box-shadow: 0 5px 15px var(--glow);
        }

        .volume-container { display: flex; align-items: center; gap: 8px; flex: 1; }
        
        #volumeSlider {
            -webkit-appearance: none; width: 100%; height: 4px;
            background: #2d3748; border-radius: 2px; outline: none;
        }
        #volumeSlider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px;
            background: var(--accent); border-radius: 50%; cursor: pointer;
        }

        /* Плейлист - зручний для дотиків */
        #playlist { 
            background: var(--card-bg); border-radius: 24px; padding: 8px; 
            border: 1px solid rgba(255,255,255,0.08); margin-bottom: 40px;
        }

        .t-item { 
            padding: 18px 15px; border-radius: 16px; cursor: pointer; 
            display: flex; align-items: center; margin-bottom: 5px; transition: 0.2s;
        }
        .t-item:active { background: rgba(255,255,255,0.08); } /* Ефект натискання */
        .t-item.active { background: rgba(0, 210, 255, 0.1); color: var(--accent); }

        .t-num { font-family: monospace; font-size: 11px; opacity: 0.3; margin-right: 15px; width: 20px; }
        .t-title { flex: 1; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        #time-info { font-size: 12px; opacity: 0.5; font-family: monospace; min-width: 40px; text-align: right; }

        /* Адаптація для дуже малих екранів */
        @media (max-width: 380px) {
            .volume-container { display: none; } /* Ховаємо звук на крихітних екранах для місця */
            .btn-play { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>

<div id="app">
    <h1>Музика згенерована ШІ</h1>
    
    <div id="folder-nav"></div>

    <div id="waveform-container">
        <div id="theme-switcher">
            <div class="theme-dot active" style="background: #00d2ff;" data-color="#00d2ff" data-glow="rgba(0, 210, 255, 0.3)"></div>
            <div class="theme-dot" style="background: #a29bfe;" data-color="#a29bfe" data-glow="rgba(162, 155, 254, 0.3)"></div>
            <div class="theme-dot" style="background: #fab1a0;" data-color="#fab1a0" data-glow="rgba(250, 177, 160, 0.3)"></div>
            <div class="theme-dot" style="background: #55efc4;" data-color="#55efc4" data-glow="rgba(85, 239, 196, 0.3)"></div>
        </div>

        <span id="track-name">Оберіть альбом</span>
        <div id="waveform"></div>
        
        <div class="controls">
            <div class="volume-container">
                <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.7">
            </div>
            
            <button class="btn-play" id="playBtn">▶</button>
            
            <div id="time-info">00:00</div>
        </div>
    </div>

    <div id="playlist">
        <div style="text-align: center; color: var(--secondary); padding: 40px;">Завантаження...</div>
    </div>
</div>

<script>
    const USER_REPO = 'christian-word/AI-Mysic';
    const BASE_API = `https://api.github.com/repos/${USER_REPO}/contents/`;
    
    let tracks = [], idx = 0;
    const trackName = document.getElementById('track-name');
    const playlist = document.getElementById('playlist');
    const folderNav = document.getElementById('folder-nav');
    const playBtn = document.getElementById('playBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const timeInfo = document.getElementById('time-info');

    const ws = WaveSurfer.create({
        container: '#waveform',
        waveColor: '#1e293b',
        progressColor: '#00d2ff',
        cursorColor: '#00d2ff',
        barWidth: 3,
        barRadius: 4,
        responsive: true,
        height: 70,
        gap: 2,
        interact: true
    });

    const formatTime = (s) => new Date(s * 1000).toISOString().substr(14, 5);
    ws.on('audioprocess', () => timeInfo.textContent = formatTime(ws.getCurrentTime()));
    ws.on('ready', () => timeInfo.textContent = formatTime(ws.getDuration()));

    const dots = document.querySelectorAll('.theme-dot');
    dots.forEach(dot => {
        dot.onclick = () => {
            dots.forEach(d => d.classList.remove('active'));
            dot.classList.add('active');
            const color = dot.getAttribute('data-color');
            const glow = dot.getAttribute('data-glow');
            document.documentElement.style.setProperty('--accent', color);
            document.documentElement.style.setProperty('--glow', glow);
            ws.setOptions({ progressColor: color, cursorColor: color });
        };
    });

    ws.setVolume(volumeSlider.value);
    volumeSlider.oninput = (e) => ws.setVolume(e.target.value);

    playBtn.onclick = () => ws.playPause();
    ws.on('play', () => playBtn.textContent = 'Ⅱ');
    ws.on('pause', () => playBtn.textContent = '▶');
    ws.on('finish', () => { if(idx < tracks.length - 1) playTrack(idx + 1); });

    const clean = n => {
        try {
            return decodeURIComponent(n).replace(/\.[^.]+$/, '').replace(/^\d+[\.\-_\s]+/, '').trim();
        } catch(e) { return n; }
    };

    async function init() {
        try {
            const response = await fetch(BASE_API);
            const items = await response.json();
            const folders = items.filter(i => i.type === 'dir' && !i.name.startsWith('.'));
            folderNav.innerHTML = '';
            folders.forEach((f, i) => {
                const btn = document.createElement('div');
                btn.className = 'folder-btn' + (i === 0 ? ' active' : '');
                btn.textContent = f.name;
                btn.onclick = () => {
                    document.querySelectorAll('.folder-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadTracks(f.path);
                };
                folderNav.appendChild(btn);
            });
            if(folders.length > 0) loadTracks(folders[0].path);
        } catch (e) { console.error(e); }
    }

    async function loadTracks(path) {
        playlist.innerHTML = '<div style="text-align: center; padding: 40px; opacity: 0.5;">...</div>';
        try {
            const response = await fetch(BASE_API + encodeURIComponent(path));
            const data = await response.json();
            tracks = data.filter(f => /\.(mp3|wav|m4a)$/i.test(f.name))
                         .sort((a,b) => a.name.localeCompare(b.name, 'uk'))
                         .map(f => ({ name: clean(f.name), url: f.download_url }));
            renderPlaylist();
        } catch (e) { console.error(e); }
    }

    function renderPlaylist() {
        playlist.innerHTML = '';
        tracks.forEach((t, i) => {
            const d = document.createElement('div');
            d.className = 't-item';
            d.innerHTML = `<span class="t-num">${(i+1).toString().padStart(2, '0')}</span><span class="t-title">${t.name}</span>`;
            d.onclick = () => playTrack(i);
            playlist.appendChild(d);
        });
        if(tracks.length > 0) trackName.textContent = "Готово до прослуховування";
    }

    function playTrack(i) {
        idx = i;
        ws.load(tracks[idx].url);
        ws.once('ready', () => ws.play());
        updateUI();
    }

    function updateUI() {
        document.querySelectorAll('.t-item').forEach((el, i) => el.classList.toggle('active', i === idx));
        if (tracks[idx]) trackName.textContent = tracks[idx].name;
    }

    init();
</script>

</body>
</html>
