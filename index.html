<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff; color: #000; padding: 20px; line-height: 1.5; }
        #app { max-width: 500px; margin: 0 auto; }
        
        /* Компактный блок управления */
        #header { position: sticky; top: 0; background: #fff; padding-bottom: 20px; border-bottom: 1px solid #eee; margin-bottom: 10px; }
        #track-name { font-size: 18px; font-weight: bold; margin-bottom: 10px; display: block; }
        audio { width: 100%; height: 40px; }

        /* Простой список */
        .t-item { 
            padding: 12px 0; border-bottom: 1px solid #f9f9f9; 
            cursor: pointer; display: flex; justify-content: space-between; 
        }
        .t-item:hover { color: #534AB7; }
        .t-item.active { color: #534AB7; font-weight: bold; }
        .t-title { flex: 1; padding-right: 10px; }
        .t-num { opacity: 0.3; margin-right: 10px; width: 20px; }
        
        #load-msg { color: #888; font-size: 14px; padding: 20px 0; }
    </style>
</head>
<body>

<div id="app">
    <div id="header">
        <span id="track-name">Оберіть трек</span>
        <audio id="audio" controls autoplay crossorigin="anonymous"></audio>
    </div>

    <div id="playlist">
        <div id="load-msg">Завантаження...</div>
    </div>
</div>

<script>
    const FOLDER = 'collection1';
    const API = 'https://api.github.com/repos/christian-word/AI-Mysic/contents/' + encodeURIComponent(FOLDER);
    
    let tracks = [], idx = 0;
    const audio = document.getElementById('audio');
    const trackName = document.getElementById('track-name');
    const playlist = document.getElementById('playlist');

    const clean = n => {
        try {
            return decodeURIComponent(n).replace(/\.[^.]+$/, '').replace(/^\d+[\.\-_\s]+/, '').trim();
        } catch(e) { return n; }
    };

    function updateUI() {
        document.querySelectorAll('.t-item').forEach((el, i) => el.classList.toggle('active', i === idx));
        if (tracks[idx]) trackName.textContent = tracks[idx].name;
    }

    function playTrack(i) {
        idx = i;
        audio.src = tracks[idx].url;
        audio.play();
        updateUI();
    }

    audio.onended = () => { if(idx < tracks.length - 1) playTrack(idx + 1); };

    fetch(API)
        .then(r => r.json())
        .then(data => {
            tracks = data
                .filter(f => /\.(mp3|wav|m4a)$/i.test(f.name))
                .sort((a,b) => a.name.localeCompare(b.name, 'uk'))
                .map(f => ({ name: clean(f.name), url: f.download_url }));
            
            playlist.innerHTML = '';
            tracks.forEach((t, i) => {
                const d = document.createElement('div');
                d.className = 't-item';
                d.innerHTML = `<span class="t-num">${i+1}</span><span class="t-title">${t.name}</span>`;
                d.onclick = () => playTrack(i);
                playlist.appendChild(d);
            });
            if(tracks.length > 0) trackName.textContent = "Готовий до відтворення";
        })
        .catch(() => playlist.innerHTML = 'Помилка завантаження');
</script>

</body>
</html>
