<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Music Player</title>
    <style>
        :root {
            --accent: #534AB7;
            --bg: #fcfcfc;
            --text: #1a1a1a;
            --secondary: #8e8e93;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 40px 20px; 
            line-height: 1.6; 
            display: flex;
            justify-content: center;
        }

        #app { 
            width: 100%;
            max-width: 480px; 
        }

        /* Заголовок зі смаком */
        h1 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--secondary);
            margin-bottom: 30px;
            text-align: center;
            font-weight: 500;
        }
        
        #header { 
            position: sticky; 
            top: 0; 
            background: rgba(252, 252, 252, 0.9); 
            backdrop-filter: blur(10px);
            padding: 20px; 
            margin-bottom: 30px; 
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            z-index: 10;
        }

        #track-name { 
            font-size: 20px; 
            font-weight: 600; 
            margin-bottom: 15px; 
            display: block; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        audio { 
            width: 100%; 
            height: 36px; 
            filter: grayscale(1) invert(0.05); /* Робимо стандартний плеєр мінімалістичнішим */
        }

        /* Список треків */
        #playlist {
            background: #fff;
            border-radius: 24px;
            padding: 10px;
        }

        .t-item { 
            padding: 16px 20px; 
            border-radius: 16px;
            cursor: pointer; 
            display: flex; 
            align-items: center;
            transition: all 0.2s ease;
            margin-bottom: 4px;
        }

        .t-item:hover { 
            background: #f4f4f7;
            color: var(--accent); 
        }

        .t-item.active { 
            background: #f0effc;
            color: var(--accent); 
            font-weight: 600; 
        }

        .t-num { 
            font-family: "SF Mono", monospace;
            font-size: 12px;
            opacity: 0.4; 
            margin-right: 20px; 
            width: 20px; 
        }

        .t-title { flex: 1; font-size: 15px; }
        
        #load-msg { text-align: center; color: var(--secondary); padding: 40px; }
    </style>
</head>
<body>

<div id="app">
    <h1>Музика згенерована ШІ</h1>

    <div id="header">
        <span id="track-name">Оберіть трек</span>
        <audio id="audio" controls autoplay crossorigin="anonymous"></audio>
    </div>

    <div id="playlist">
        <div id="load-msg">Синхронізація з колекцією...</div>
    </div>
</div>

<script>
    const FOLDER = 'collection1';
    const API = 'https://api.github.com/repos/christian-word/AI-Mysic/contents/' + encodeURIComponent(FOLDER);
    
    let tracks = [], idx = 0;
    const audio = document.getElementById('audio');
    const trackName = document.getElementById('track-name');
    const playlist = document.getElementById('playlist');

    const clean = n => {
        try {
            return decodeURIComponent(n)
                .replace(/\.[^.]+$/, '')
                .replace(/^\d+[\.\-_\s]+/, '')
                .trim();
        } catch(e) { return n; }
    };

    function updateUI() {
        document.querySelectorAll('.t-item').forEach((el, i) => el.classList.toggle('active', i === idx));
        if (tracks[idx]) trackName.textContent = tracks[idx].name;
    }

    function playTrack(i) {
        idx = i;
        audio.src = tracks[idx].url;
        audio.play();
        updateUI();
    }

    audio.onended = () => { if(idx < tracks.length - 1) playTrack(idx + 1); };

    fetch(API)
        .then(r => r.json())
        .then(data => {
            tracks = data
                .filter(f => /\.(mp3|wav|m4a)$/i.test(f.name))
                .sort((a,b) => a.name.localeCompare(b.name, 'uk'))
                .map(f => ({ name: clean(f.name), url: f.download_url }));
            
            playlist.innerHTML = '';
            tracks.forEach((t, i) => {
                const d = document.createElement('div');
                d.className = 't-item';
                d.innerHTML = `<span class="t-num">${(i+1).toString().padStart(2, '0')}</span><span class="t-title">${t.name}</span>`;
                d.onclick = () => playTrack(i);
                playlist.appendChild(d);
            });
            if(tracks.length > 0) trackName.textContent = "Готовий до прослуховування";
        })
        .catch(() => playlist.innerHTML = '<div id="load-msg">Помилка завантаження</div>');
</script>

</body>
</html>
